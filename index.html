<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SY — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/intro.css">
</head>
<body>

  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <main class="page">
    <div class="top-bar">
      <div class="logotype">
  <img src="./img/logo.png" alt="Toni Sandra Sy">
</div>
      <div class="top-right">
        <div class="status"><span class="status-dot"></span> Open to work</div>
        <div class="year">© 2026</div>
      </div>
    </div>

    <div class="hero">
      <div class="hero-left">
        
        <h1 class="hero-name">S<em>Y</em></h1>
      </div>
      <div class="hero-right">
        <div class="scheme-row" id="schemeRow">
          <button class="scheme-btn active" data-scheme="1" title="Scheme 1"><span class="dot" style="background:#f4c0d1"></span></button>
          <button class="scheme-btn" data-scheme="2" title="Scheme 2"><span class="dot" style="background:#ede6d8"></span></button>
          <button class="scheme-btn" data-scheme="3" title="Scheme 3"><span class="dot" style="background:#d4e8d0"></span></button>
          <button class="scheme-btn" data-scheme="4" title="Scheme 4"><span class="dot" style="background:#f5f0e8"></span></button>
          <button class="scheme-btn" data-scheme="5" title="Scheme 5"><span class="dot" style="background:#c4789a"></span></button>
        </div>
        <div class="role-block">
          <div class="role-label">Current role</div>
          <div class="role-title">Software Engineer<br><em>& Graphic Designer</em></div>
        </div>
        <a href="info.html" class="enter-btn" id="enterBtn">
          <span>View Portfolio</span>
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="bottom-left">
        <span class="b-location">General Trias, Cavite · PH</span>
        <span class="b-email">tonisandra.sy2003@gmail.com</span>
      </div>
      <div class="bottom-center">
        <div class="ticker" id="ticker">UI/UX &nbsp;·&nbsp; Web Dev &nbsp;·&nbsp; Branding</div>
      </div>
      <div class="bottom-right">
        <div class="stat-item"><div class="stat-num">20+</div><div class="stat-label">Projects</div></div>
        <div class="stat-item"><div class="stat-num">1+</div><div class="stat-label">Years</div></div>
        <div class="stat-item"><div class="stat-num">5+</div><div class="stat-label">Skills</div></div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/intro.js" defer></script>
</body>
</html>
